<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Detail - Skill_X</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 2rem;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 2px solid #eee;
            padding-bottom: 1rem;
        }
        h1 {
            color: #333;
            margin: 0;
        }
        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background: #764ba2;
        }
        .report-section {
            margin-bottom: 2rem;
        }
        .report-section h2 {
            color: #667eea;
            font-size: 1.2rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid #667eea;
            padding-bottom: 0.5rem;
        }
        .report-field {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid #eee;
        }
        .field-label {
            font-weight: bold;
            color: #333;
        }
        .field-value {
            color: #666;
        }
        .stat-box {
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            color: #666;
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Report Details</h1>
            <div class="action-buttons">
                <button onclick="alert('Export feature coming soon!')">Export</button>
                <button onclick="window.history.back()">Back</button>
            </div>
        </div>

        <div class="report-section">
            <h2>Report Summary</h2>
            <div class="report-field">
                <span class="field-label">Report ID:</span>
                <span class="field-value">{{ report.id|default:"N/A" }}</span>
            </div>
            <div class="report-field">
                <span class="field-label">Created:</span>
                <span class="field-value">{{ report.timestamp|default:"N/A" }}</span>
            </div>
            <div class="report-field">
                <span class="field-label">Status:</span>
                <span class="field-value">Complete</span>
            </div>
        </div>

        <div class="report-section">
            <h2>Metrics</h2>
            <div class="stat-box">
                <div class="stat-value">100%</div>
                <div class="stat-label">Completion Rate</div>
            </div>
            <div class="stat-box">
                <div class="stat-value">42</div>
                <div class="stat-label">Activities Logged</div>
            </div>
        </div>

        <div class="report-section">
            <h2>Details</h2>
            <div class="report-field">
                <span class="field-label">Description:</span>
                <span class="field-value">{{ report.description|default:"Report details here" }}</span>
            </div>
        </div>
    </div>
</body>
</html>
