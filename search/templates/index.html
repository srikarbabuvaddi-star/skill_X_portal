<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results - Skill_X</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 2rem;
        }
        .search-header {
            margin-bottom: 2rem;
        }
        .search-header h1 {
            color: #333;
            margin: 0 0 0.5rem 0;
        }
        .search-header p {
            color: #666;
            margin: 0;
        }
        .search-box {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }
        .search-box input {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
        }
        .search-box button {
            background: #667eea;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        .search-box button:hover {
            background: #764ba2;
        }
        .results {
            display: grid;
            gap: 1rem;
        }
        .result-item {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 1.5rem;
            transition: all 0.3s;
            cursor: pointer;
        }
        .result-item:hover {
            background: #f9f9f9;
            border-color: #667eea;
        }
        .result-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #667eea;
            margin: 0 0 0.5rem 0;
        }
        .result-description {
            color: #666;
            margin: 0;
        }
        .empty-state {
            text-align: center;
            color: #999;
            padding: 3rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="search-header">
            <h1>🔍 Search Results</h1>
            <p>Found {{ matches|length }} result{% if matches|length != 1 %}s{% endif %} for "{{ term }}"</p>
        </div>
        <div class="search-box">
            <input type="text" placeholder="Search again...">
            <button onclick="alert('Search feature coming soon!')">Search</button>
        </div>
        <div class="results">
            {% if matches %}
                {% for match in matches %}
                    <div class="result-item">
                        <p class="result-title">{{ match }}</p>
                        <p class="result-description">Search result item</p>
                    </div>
                {% endfor %}
            {% else %}
                <div class="empty-state">
                    <p>No results found for "{{ term }}". Try a different search term.</p>
                </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
