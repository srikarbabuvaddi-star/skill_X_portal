<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scheduling Calendar - Skill_X</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 2rem;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 2rem;
        }
        .calendar-matrix {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .day-header {
            text-align: center;
            font-weight: bold;
            color: #667eea;
            padding: 0.5rem;
        }
        .day-slot {
            aspect-ratio: 1;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: white;
            transition: all 0.3s;
        }
        .day-slot:hover {
            background: #f0f0f0;
            border-color: #667eea;
        }
        .day-slot.available {
            background: #e8f5e9;
            border-color: #4caf50;
            color: #2e7d32;
            font-weight: bold;
        }
        .day-slot.booked {
            background: #ffebee;
            border-color: #f44336;
            color: #c62828;
            font-weight: bold;
        }
        .legend {
            display: flex;
            gap: 2rem;
            justify-content: center;
            padding: 1rem;
            background: #f5f5f5;
            border-radius: 8px;
            text-align: center;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 2px solid;
        }
        .empty-state {
            text-align: center;
            color: #999;
            padding: 3rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 Scheduling Calendar</h1>
        
        {% if slots %}
            <div class="calendar-matrix">
                <div class="day-header">Mon</div>
                <div class="day-header">Tue</div>
                <div class="day-header">Wed</div>
                <div class="day-header">Thu</div>
                <div class="day-header">Fri</div>
                <div class="day-header">Sat</div>
                <div class="day-header">Sun</div>
                
                {% for slot in slots %}
                    <div class="day-slot available">{{ slot }}</div>
                {% endfor %}
            </div>
            
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: #e8f5e9; border-color: #4caf50;"></div>
                    <span>Available</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ffebee; border-color: #f44336;"></div>
                    <span>Booked</span>
                </div>
            </div>
        {% else %}
            <div class="empty-state">
                <p>No available slots at the moment. Check back later!</p>
            </div>
        {% endif %}
    </div>
</body>
</html>
