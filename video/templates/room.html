<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Room - Skill_X</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a1a;
            color: #fff;
            margin: 0;
            padding: 2rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .video-room {
            background: #2a2a2a;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            margin-bottom: 2rem;
        }
        .video-placeholder {
            background: #1a1a1a;
            border: 2px solid #667eea;
            border-radius: 8px;
            padding: 4rem 2rem;
            text-align: center;
            margin-bottom: 2rem;
        }
        .video-placeholder p {
            color: #aaa;
            font-size: 1.1rem;
        }
        .session-info {
            background: #333;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }
        .session-info p {
            margin: 0.5rem 0;
            color: #ccc;
        }
        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }
        button:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="video-room">
            <h1>📹 Video Room</h1>
            <div class="video-placeholder">
                <p>🎥 Video stream placeholder</p>
                <p>Session: {{ session }}</p>
            </div>
            <div class="session-info">
                <p><strong>Session Token:</strong> {{ session }}</p>
                <p><strong>Status:</strong> Ready</p>
            </div>
            <div class="button-group">
                <button onclick="alert('Start recording feature coming soon!')">Start Recording</button>
                <button onclick="alert('Share screen feature coming soon!')">Share Screen</button>
                <button onclick="window.history.back()">Back</button>
            </div>
        </div>
    </div>
</body>
</html>
